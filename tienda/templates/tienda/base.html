<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Misso{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Adelia';
            src: url('/static/fonts/ADELIA.otf') format('opentype');
        }
        @font-face {
            font-family: 'Romantic';
            src: url('/static/fonts/ROMANTIC.TTF');
        }
        
        @font-face {
            font-family: 'Eternalo';
            src: url('/static/fonts/Eternalo.ttf');
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
           --rosa: #7b2d3a;
           --rosa-deep: #5c1e28;
           --rosa-light: #ffdae1;
           --rosa-section: #6b2535;
           --blanco: #ffffff;
           --texto: #1a1a1a;
           --gris: #888;
           --borde: #d9b0b6;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--blanco); color: var(--texto); cursor: auto; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 60px; background: white; border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 100; }
        nav a { text-decoration: none; color: var(--texto); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.2s; }
        nav a:hover { color: var(--rosa-deep); }
        .logo { font-family: 'Romantic', serif; font-size: 35px; letter-spacing: 4px; color: var(--texto); text-transform: none; }
        .nav-links { display: flex; gap: 40px; align-items: center; }

        /* Carrito con ícono SVG + badge */
        .nav-carrito {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .nav-carrito svg {
            width: 22px;
            height: 22px;
            stroke: var(--texto);
            fill: none;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
        }
        .nav-carrito:hover svg {
            stroke: var(--rosa-deep);
        }
        .cart-badge {
            position: absolute;
            top: -7px;
            right: -9px;
            font-size: 9px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            color: var(--texto);
            min-width: 14px;
            text-align: center;
            letter-spacing: 0;
        }

        /* Carrito mobile */
        .carrito-mobile {
            display: none;
            position: relative;
        }
        .carrito-mobile svg {
            width: 22px;
            height: 22px;
            stroke: var(--texto);
            fill: none;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .cart-badge-mobile {
            position: absolute;
            top: -7px;
            right: -9px;
            font-size: 9px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            color: var(--texto);
            min-width: 14px;
            text-align: center;
            letter-spacing: 0;
        }

        main { min-height: 60vh; }

        footer { text-align: center; padding: 20px 50px; background: var(--rosa-light); border-top: 1px solid var(--borde); font-size: 10px; letter-spacing: 2px; color: var(--gris); text-transform: uppercase; margin-top: 0; }
        footer .footer-logo { font-family: 'Romantic', serif; font-size: 36px; color: var(--rosa); letter-spacing: 4px; display: block; margin-bottom: 12px; text-transform: none; }
        .footer-info { display: flex; justify-content: center; gap: 24px; margin-bottom: 8px; font-size: 10px; letter-spacing: 2px; flex-wrap: wrap; }
        .footer-info a { color: var(--rosa); text-decoration: none; transition: color 0.2s; }
        .footer-info a:hover { color: var(--rosa-deep); }
        .footer-info span { color: var(--gris); }
        .footer-copy { font-size: 9px; letter-spacing: 2px; color: var(--gris); }

        .hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto); }
        .cerrar-menu { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--texto); margin-bottom: 20px; }

        .mobile-menu {
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 999;
            align-items: center;
            justify-content: center;
            gap: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .mobile-menu a { font-size: 22px; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: var(--texto); font-family: 'DM Sans', sans-serif; }
        .mobile-menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
            .carrito-mobile { display: inline-flex; }
            .logo { font-size: 20px; letter-spacing: 2px; }
            nav { padding: 16px 20px; }
            footer { padding: 6px 20px; font-size: 9px; }
            footer .footer-logo { font-size: 24px; margin-bottom: 6px; }
            .footer-info { gap: 12px; font-size: 9px; flex-direction: column; align-items: center; margin-bottom: 8px; flex-direction: row;}
            .footer-copy { font-size: 8px; }
        }

        a {
            color: #e8a0b0;
            text-decoration: none;
        }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/tienda">Tienda</a>
        </div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <a href="/" class="logo">Misso</a>
        <div class="nav-links">
            <a href="/tienda/carrito/" class="nav-carrito">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-badge" id="cart-count">{{ cart_count|default:0 }}</span>
            </a>
        </div>
        <a href="/tienda/carrito/" class="carrito-mobile">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            <span class="cart-badge-mobile" id="cart-count-mobile">{{ cart_count|default:0 }}</span>
        </a>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <button class="cerrar-menu" onclick="toggleMenu()">✕</button>
        <a href="/">Inicio</a>
        <a href="/tienda">Tienda</a>
        <a href="/tienda/carrito/">Carrito</a>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span class="footer-logo">Misso</span>
        <div class="footer-info">
            <a href="https://instagram.com/misso.cba" target="_blank">➤ @misso.cba</a>
            <a href="https://wa.me/543517727224" target="_blank">✆ +54 351 772 7224</a>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
