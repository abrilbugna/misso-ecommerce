<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Misso{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Adelia';
            src: url('/static/fonts/ADELIA.otf') format('opentype');
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
           --rosa: #7b2d3a;
           --rosa-deep: #5c1e28;
           --rosa-light: #f5eaec;
           --rosa-section: #6b2535;
           --blanco: #ffffff;
           --texto: #1a1a1a;
           --gris: #888;
           --borde: #d9b0b6;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--blanco); color: var(--texto); cursor: none; }

        #cursor-custom { position: fixed; pointer-events: none; z-index: 9999; top: 0; left: 0; will-change: left, top; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 60px; background: white; border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 100; }
        nav a { text-decoration: none; color: var(--texto); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.2s; }
        nav a:hover { color: var(--rosa-deep); }
        .logo { font-family: 'Adelia', serif; font-size: 32px; letter-spacing: 4px; color: var(--texto); text-transform: none; }
        .nav-links { display: flex; gap: 40px; }
        .nav-carrito { position: relative; }

        main { min-height: 60vh; }

        footer { text-align: center; padding: 50px; background: var(--rosa-light); border-top: 1px solid var(--borde); font-size: 11px; letter-spacing: 3px; color: var(--gris); text-transform: uppercase; margin-top: 0; }
        footer .footer-logo { font-family: 'Adelia', serif; font-size: 64px; color: var(--rosa-deep); letter-spacing: 6px; display: block; margin-bottom: 20px; text-transform: none; }

        .hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto); }
        .carrito-mobile { display: none; font-size: 24px; text-decoration: none; }
        .cerrar-menu { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--texto); margin-bottom: 20px; }

        .mobile-menu { display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; align-items: center; justify-content: center; gap: 40px; }
        .mobile-menu a { font-size: 22px; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: var(--texto); font-family: 'DM Sans', sans-serif; }
        .mobile-menu.active { display: flex; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
            .carrito-mobile { display: block; }
            .logo { font-size: 20px; letter-spacing: 2px; }
            nav { padding: 16px 20px; }
            .nav-links { display: none; }
            .hamburger { display: block; }
            .carrito-mobile { display: block; }
            .logo { font-size: 20px; letter-spacing: 2px; }
            nav { padding: 16px 20px; }
            body { cursor: auto; }
            #cursor-custom { display: none; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/tienda">Tienda</a>
        </div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <a href="/" class="logo">Misso</a>
        <div class="nav-links">
            <a href="/tienda/carrito/" class="nav-carrito">Carrito</a>
        </div>
        <a href="/tienda/carrito/" class="carrito-mobile">🛍</a>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <button class="cerrar-menu" onclick="toggleMenu()">✕</button>
        <a href="/" onclick="toggleMenu()">Inicio</a>
        <a href="/tienda" onclick="toggleMenu()">Tienda</a>
        <a href="/tienda/carrito/" onclick="toggleMenu()">Carrito</a>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span class="footer-logo">Misso</span>
        © 2026 Misso — Argentina
    </footer>

    <script>
        const cursorDiv = document.createElement('div');
        cursorDiv.id = 'cursor-custom';
        cursorDiv.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
                <rect x="0" y="0" width="2" height="2" fill="#5c1e28"/>
                <rect x="0" y="2" width="2" height="2" fill="#5c1e28"/>
                <rect x="0" y="4" width="2" height="2" fill="#5c1e28"/>
                <rect x="0" y="6" width="2" height="2" fill="#5c1e28"/>
                <rect x="0" y="8" width="2" height="2" fill="#5c1e28"/>
                <rect x="0" y="10" width="2" height="2" fill="#5c1e28"/>
                <rect x="2" y="2" width="2" height="2" fill="#7b2d3a"/>
                <rect x="2" y="4" width="2" height="2" fill="#7b2d3a"/>
                <rect x="2" y="6" width="2" height="2" fill="#7b2d3a"/>
                <rect x="2" y="8" width="2" height="2" fill="#7b2d3a"/>
                <rect x="2" y="10" width="2" height="2" fill="#5c1e28"/>
                <rect x="4" y="4" width="2" height="2" fill="#7b2d3a"/>
                <rect x="4" y="6" width="2" height="2" fill="#7b2d3a"/>
                <rect x="4" y="8" width="2" height="2" fill="#7b2d3a"/>
                <rect x="4" y="10" width="2" height="2" fill="#5c1e28"/>
                <rect x="4" y="12" width="2" height="2" fill="#5c1e28"/>
                <rect x="6" y="6" width="2" height="2" fill="#7b2d3a"/>
                <rect x="6" y="8" width="2" height="2" fill="#7b2d3a"/>
                <rect x="6" y="10" width="2" height="2" fill="#5c1e28"/>
                <rect x="6" y="12" width="2" height="2" fill="#7b2d3a"/>
                <rect x="6" y="14" width="2" height="2" fill="#5c1e28"/>
                <rect x="8" y="8" width="2" height="2" fill="#7b2d3a"/>
                <rect x="8" y="10" width="2" height="2" fill="#5c1e28"/>
                <rect x="10" y="10" width="2" height="2" fill="#5c1e28"/>
            </svg>`;
        document.body.appendChild(cursorDiv);

        document.addEventListener('mousemove', e => {
            cursorDiv.style.left = e.clientX + 'px';
            cursorDiv.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursorDiv.style.transform = 'scale(1.4)');
            el.addEventListener('mouseleave', () => cursorDiv.style.transform = 'scale(1)');
        });

        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
