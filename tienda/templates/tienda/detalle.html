{% extends 'tienda/base.html' %}

{% block title %}{{ producto.nombre }} — Misso{% endblock %}

{% block content %}
<style>
    .detalle { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .detalle img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .detalle-info { padding-top: 20px; }
    .detalle-nombre { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; margin-bottom: 20px; letter-spacing: 2px; }
    .detalle-precio { font-size: 18px; color: #888; margin-bottom: 30px; }
    .detalle-descripcion { font-size: 14px; line-height: 1.8; color: #555; margin-bottom: 40px; }
    .btn { display: block; width: 100%; padding: 16px; background: #2c2c2c; color: #faf9f7; border: none; font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; }
    .btn:hover { background: #444; }
    .volver { display: inline-block; margin-bottom: 40px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #888; text-decoration: none; }
</style>

<div style="padding: 40px 60px 80px;">
<a href="/tienda" class="volver">← Volver</a>

<div class="detalle">
    <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}">
    <div class="detalle-info">
        <h1 class="detalle-nombre">{{ producto.nombre }}</h1>
        <p class="detalle-precio">${{ producto.precio }}</p>
        <p class="detalle-descripcion">{{ producto.descripcion }}</p>
        <a href="/tienda/agregar/{{ producto.pk }}/" class="btn">Agregar al carrito</a>
    </div>
</div>
</div>
{% endblock %}
